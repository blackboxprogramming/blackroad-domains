name: Self-Healing

on:
  schedule:
    - cron: '0 */6 * * *' # Every 6 hours
  workflow_dispatch:
  workflow_run:
    workflows: ["Auto Deploy"]
    types: [completed]

permissions:
  contents: write
  issues: write

jobs:
  monitor:
    name: Monitor Deployments
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Check Health
        id: health
        run: |
          if [ -n "${{ secrets.DEPLOY_URL }}" ]; then
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.DEPLOY_URL }}" || echo "000")
            echo "status=$STATUS" >> $GITHUB_OUTPUT
          else
            echo "status=skip" >> $GITHUB_OUTPUT
          fi

      - name: Auto-Rollback on Failure
        if: steps.health.outputs.status != '200' && steps.health.outputs.status != 'skip' && steps.health.outputs.status != '000'
        run: |
          echo "Health check failed (Status: ${{ steps.health.outputs.status }})"
          echo "Triggering rollback to previous commit..."
          gh workflow run auto-deploy.yml --ref "$(git rev-parse HEAD~1)"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create Issue on Failure
        if: failure()
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            const existing = await github.rest.issues.listForRepo({
              ...context.repo,
              labels: 'deployment,auto-generated',
              state: 'open'
            });
            if (existing.data.length === 0) {
              await github.rest.issues.create({
                ...context.repo,
                title: 'Self-Healing: Deployment Health Check Failed',
                body: `Deployment health check failed.\n\nStatus: ${{ steps.health.outputs.status }}\nWorkflow: ${context.workflow}\nRun: ${context.runId}\nTime: ${new Date().toISOString()}`,
                labels: ['bug', 'deployment', 'auto-generated']
              });
            }
