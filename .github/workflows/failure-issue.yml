name: CI Failure Tracker

on:
  workflow_run:
    workflows: ["CORE CI"]
    types: [completed]

permissions:
  issues: write

jobs:
  report:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            await github.rest.issues.create({
              ...context.repo,
              title: "CI failed: " + context.payload.workflow_run.name,
              body: `CI workflow **${context.payload.workflow_run.name}** failed.\n\nRun: ${context.payload.workflow_run.html_url}\nBranch: ${context.payload.workflow_run.head_branch}\nCommit: ${context.payload.workflow_run.head_sha}`,
              labels: ['bug', 'ci-failure', 'auto-generated']
            })
